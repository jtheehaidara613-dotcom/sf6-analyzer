name: 週次ベンチマーク更新

on:
  schedule:
    - cron: '17 18 * * 0'  # 毎週日曜 UTC 18:17 = JST 03:17
  workflow_dispatch:        # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージインストール
        run: pip install yt-dlp opencv-python-headless numpy scipy

      - name: プロベンチマーク更新（未登録キャラのみ）
        run: python batch_collect.py --max-sec 300
        timeout-minutes: 60

      - name: 変更があればコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pro_benchmarks.json
          git diff --cached --quiet || git commit -m "週次ベンチマーク自動更新"
          git push
